services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetmgr
      POSTGRES_PASSWORD: meetmgr
      POSTGRES_DB: meetmgr
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://meetmgr:meetmgr@db/meetmgr
      SECRET_KEY: test-local-dev-key-change-in-prod
      ADMIN_PIN: "314159"
      APP_BASE_URL: http://localhost:8001
    depends_on:
      - db

volumes:
  pgdata:
