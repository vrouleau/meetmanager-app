services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetmgr
      POSTGRES_PASSWORD: meetmgr
      POSTGRES_DB: meetmgr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmgr"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://meetmgr:meetmgr@db:5432/meetmgr
      ADMIN_PIN: "314159"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-noreply@example.com}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8001}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - appdata:/app/data

  frontend:
    build: ./frontend
    ports:
      - "8001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  appdata:
