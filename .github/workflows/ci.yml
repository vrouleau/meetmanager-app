name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test deps
        run: pip install -r tests/requirements-test.txt

      - name: Run integration tests
        run: pytest tests/ -v
        env:
          ADMIN_PIN: "314159"

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs --no-color backend db || true

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v || true

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
